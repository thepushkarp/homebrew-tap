name: Update Formula

on:
  repository_dispatch:
    types: [mls-release]

permissions:
  contents: write

jobs:
  update:
    name: Update mls formula
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Update formula
        env:
          VERSION: ${{ github.event.client_payload.version }}
          AARCH64_SHA256: ${{ github.event.client_payload.aarch64_sha256 }}
          X86_64_SHA256: ${{ github.event.client_payload.x86_64_sha256 }}
        run: |
          sed -i \
            -e "s/version \".*\"/version \"${VERSION}\"/" \
            -e "0,/sha256 \".*\"/{s/sha256 \".*\"/sha256 \"${AARCH64_SHA256}\"/}" \
            -e "/intel/,\${ 0,/sha256 \".*\"/{s/sha256 \".*\"/sha256 \"${X86_64_SHA256}\"/} }" \
            Formula/mls.rb

      - name: Verify formula
        run: |
          grep -q 'depends_on "ffmpeg"' Formula/mls.rb
          grep -q 'depends_on "mpv"' Formula/mls.rb

      - name: Commit and push
        env:
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/mls.rb
          git commit -m "mls ${VERSION}"
          git push
