name: Verify Formula

on:
  pull_request:
  push:
    branches:
      - main

permissions: {}

jobs:
  verify:
    name: Verify mls formula dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check runtime dependencies
        run: |
          grep -q 'depends_on "ffmpeg"' Formula/mls.rb
          grep -q 'depends_on "mpv"' Formula/mls.rb
